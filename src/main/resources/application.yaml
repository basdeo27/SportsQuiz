spring:
  application:
    name: Sports-Quiz
  profiles:
    active: prod

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info
  endpoint:
    health:
      show-details: never

ai:
  mistral:
    api-key: ${MISTRAL_API_KEY:}
    model: mistral-small-latest

quiz:
  storage: ${QUIZ_STORAGE:local}
  cors:
    allowed-origins:
      - https://d2323rgqey2wlv.cloudfront.net
      - https://funsportsquiz.com
      - http://localhost:5173
  questions:
    storage: local
  settings:
    min-questions: 1
    max-questions: 25
    disabled-logo-leagues:
      - EPL
    disabled-face-leagues: []
  dynamo:
    endpoint: "https://dynamodb.eu-west-2.amazonaws.com"
    region: eu-west-2
    teams-table-name: sports-quiz-teams
    results-table-name: sports-quiz-results
    seed: false
    access-key: ${AWS_DYNAMO_ACCESS_KEY_ID:}
    secret-key: ${AWS_DYNAMO_SECRET_ACCESS_KEY:}
