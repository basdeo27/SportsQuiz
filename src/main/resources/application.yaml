spring:
  application:
    name: Sports-Quiz
  profiles:
    active: prod

quiz:
  cors:
    allowed-origins:
      - https://d2323rgqey2wlv.cloudfront.net
      - http://localhost:5173
  questions:
    storage: local
  results:
    storage: local
  settings:
    min-questions: 1
    max-questions: 25
    disabled-leagues:
      - EPL
  dynamo:
    endpoint: "https://dynamodb.eu-west-2.amazonaws.com"
    region: eu-west-2
    teams-table-name: sports-quiz-teams
    results-table-name: sports-quiz-results
    seed: false
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_CODE:}
